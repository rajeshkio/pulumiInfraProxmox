apiVersion: k3k.io/v1beta1
kind: Cluster
metadata:
  name: virtualmode 
  namespace: k3k-virtual
spec:
  mode: virtual
  servers: 1
  agents: 0
  version: v1.34.3-k3s3 
  serverResources:
    requests:
      cpu: "4"
      memory: 8Gi
    limits:
      cpu: "6"
      memory: 16Gi
  tlsSANs:
    - 192.168.90.100
  serverArgs:
    - --tls-san=192.168.90.100
  expose:
    nodePort: {}
  mirrorHostNodes: true
