apiVersion: k3k.io/v1beta1
kind: Cluster
metadata:
  name: dev
  namespace: k3k-dev
spec:
  mode: shared
  servers: 1
  agents: 0
  version: v1.34.3-k3s1
  serverResources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 8Gi
  tlsSANs:
    - 192.168.90.100
  serverArgs:
    - --tls-san=192.168.90.100
  expose:
    nodePort: {}
  mirrorHostNodes: true
  sync:
    storageClasses:
      enabled: true
